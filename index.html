<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Book Marketplace - Full Dashboard</title>
<style>
  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
  }
  #app-container {
    background: white;
    max-width: 680px;
    width: 100%;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    padding: 24px 28px 28px;
    display: flex;
    flex-direction: column;
    min-height: 600px;
  }
  h2, h3 {
    margin-top: 0;
    color: #222;
    font-weight: 700;
  }
  /* AUTH FORM */
  #auth-form {
    display: flex;
    flex-direction: column;
  }
  input[type="email"],
  input[type="password"],
  input[type="text"],
  input[type="number"],
  input[type="file"] {
    padding: 12px 14px;
    margin-bottom: 16px;
    border-radius: 8px;
    border: 1.8px solid #ccc;
    font-size: 16px;
    transition: border-color 0.3s ease;
  }
  input[type="email"]:focus,
  input[type="password"]:focus,
  input[type="text"]:focus,
  input[type="number"]:focus,
  input[type="file"]:focus {
    border-color: #3b82f6;
    outline: none;
  }
  button {
    padding: 14px;
    border: none;
    border-radius: 8px;
    background-color: #3b82f6;
    color: white;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background-color 0.3s ease;
    user-select: none;
  }
  button:hover:not(:disabled) {
    background-color: #2563eb;
  }
  button:disabled {
    background-color: #a5b4fc;
    cursor: not-allowed;
  }
  #auth-error, #auth-status, #book-error, #book-status, #search-error, #search-status, #chat-error, #chat-status {
    text-align: center;
    margin-bottom: 16px;
    font-weight: 600;
    min-height: 24px;
    user-select: none;
  }
  #auth-error, #book-error, #search-error, #chat-error {
    color: #ef4444;
  }
  #auth-status, #book-status, #search-status, #chat-status {
    color: #22c55e;
  }
  #upload-progress {
    width: 100%;
    height: 22px;
    border-radius: 10px;
    overflow: hidden;
    appearance: none;
    margin-bottom: 20px;
    display: none;
  }
  #upload-progress::-webkit-progress-bar {
    background-color: #e5e7eb;
  }
  #upload-progress::-webkit-progress-value {
    background-color: #3b82f6;
    transition: width 0.25s ease;
  }
  /* DASHBOARD */
  #dashboard {
    display: none;
    flex-direction: column;
    flex-grow: 1;
  }
  #dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  #dashboard-header h3 {
    margin: 0;
    font-weight: 700;
    font-size: 20px;
    color: #111827;
    user-select: none;
  }
  #logout-btn {
    background-color: #ef4444;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
  }
  #logout-btn:hover {
    background-color: #b91c1c;
  }
  /* Tabs */
  #tabs {
    display: flex;
    border-bottom: 2px solid #ddd;
    margin-bottom: 20px;
  }
  #tabs button {
    flex-grow: 1;
    padding: 12px 0;
    background: none;
    border: none;
    border-bottom: 4px solid transparent;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    color: #555;
    transition: all 0.3s ease;
    user-select: none;
  }
  #tabs button.active {
    border-bottom-color: #3b82f6;
    color: #1e40af;
    font-weight: 700;
  }
  /* Tab Content */
  .tab-content {
    flex-grow: 1;
    overflow-y: auto;
  }
  /* Sell Book Form */
  #book-form {
    max-width: 100%;
  }
  /* Search Books */
  #search-section {
    display: flex;
    flex-direction: column;
  }
  #search-input {
    padding: 12px 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 1.8px solid #ccc;
    margin-bottom: 16px;
    transition: border-color 0.3s ease;
  }
  #search-input:focus {
    border-color: #3b82f6;
    outline: none;
  }
  #search-results {
    max-height: 320px;
    overflow-y: auto;
    border-radius: 8px;
    border: 1.5px solid #ddd;
    padding: 12px;
    background: #fafafa;
  }
  .book-item {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 10px;
  }
  .book-item:last-child {
    border-bottom: none;
  }
  .book-photo {
    width: 60px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    margin-right: 14px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.1);
  }
  .book-info {
    flex-grow: 1;
  }
  .book-name {
    font-weight: 700;
    font-size: 16px;
    margin: 0 0 4px 0;
  }
  .book-subject {
    font-size: 14px;
    color: #555;
    margin: 0 0 4px 0;
  }
  .book-price {
    font-weight: 600;
    color: #3b82f6;
  }
  /* Chat Section */
  #chat-section {
    display: flex;
    height: 400px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
  }
  #user-list {
    width: 140px;
    border-right: 1.5px solid #ddd;
    overflow-y: auto;
    background: #f9fafb;
  }
  #user-list h4 {
    margin: 12px;
    font-size: 16px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 6px;
  }
  .user-item {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
    user-select: none;
  }
  .user-item:hover {
    background-color: #e0e7ff;
  }
  .user-item.selected {
    background-color: #c7d2fe;
    font-weight: 700;
  }
  #chat-window {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }
  #chat-header {
    padding: 12px 16px;
    background-color: #3b82f6;
    color: white;
    font-weight: 700;
    user-select: none;
  }
  #messages {
    flex-grow: 1;
    padding: 14px 16px;
    overflow-y: auto;
    background: #f9fafb;
  }
  .message {
    margin-bottom: 12px;
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 14px;
    word-wrap: break-word;
    font-size: 14px;
    line-height: 1.3;
  }
  .message.sent {
    background-color: #3b82f6;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .message.received {
    background-color: #e5e7eb;
    color: #333;
    align-self: flex-start;
    border-bottom-left-radius: 2px;
  }
  #chat-input-container {
    display: flex;
    padding: 12px 16px;
    border-top: 1.5px solid #ddd;
    background: white;
  }
  #chat-input {
    flex-grow: 1;
    border-radius: 14px;
    border: 1.8px solid #ccc;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    resize: none;
  }
  #chat-send-btn {
    margin-left: 12px;
    background-color: #3b82f6;
    border: none;
    color: white;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 14px;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
  }
  #chat-send-btn:hover:not(:disabled) {
    background-color: #2563eb;
  }
  #chat-send-btn:disabled {
    background-color: #a5b4fc;
    cursor: not-allowed;
  }
  /* Scrollbar tweaks */
  #search-results::-webkit-scrollbar,
  #user-list::-webkit-scrollbar,
  #messages::-webkit-scrollbar {
    width: 8px;
  }
  #search-results::-webkit-scrollbar-thumb,
  #user-list::-webkit-scrollbar-thumb,
  #messages::-webkit-scrollbar-thumb {
    background-color: #cbd5e1;
    border-radius: 8px;
  }
  #search-results::-webkit-scrollbar-track,
  #user-list::-webkit-scrollbar-track,
  #messages::-webkit-scrollbar-track {
    background-color: #f0f2f5;
  }

  /* Responsive */
  @media (max-width: 720px) {
    #app-container {
      max-width: 100%;
      height: 100vh;
      border-radius: 0;
      padding: 16px 20px 20px;
    }
    #chat-section {
      flex-direction: column;
      height: 500px;
    }
    #user-list {
      width: 100%;
      height: 140px;
      border-right: none;
      border-bottom: 1.5px solid #ddd;
    }
    #chat-window {
      height: calc(100% - 140px);
    }
  }
</style>
</head>
<body>

<div id="app-container">

  <!-- AUTH FORM -->
  <form id="auth-form" autocomplete="off">
    <h2>Login or Sign Up</h2>
    <input type="email" id="email" placeholder="Email address" autocomplete="username" required />
    <input type="password" id="password" placeholder="Password (min 6 chars)" autocomplete="current-password" required minlength="6" />
    <div style="display:flex; gap:12px; margin-bottom: 18px;">
      <button id="login-btn" type="submit" style="flex-grow:1;">Login</button>
      <button id="register-btn" type="button" style="flex-grow:1; background-color:#22c55e;">Sign Up</button>
    </div>
    <div id="auth-status"></div>
    <div id="auth-error"></div>
  </form>

  <!-- DASHBOARD -->
  <section id="dashboard">

    <div id="dashboard-header">
      <h3>Welcome, <span id="user-email"></span>!</h3>
      <button id="logout-btn">Logout</button>
    </div>

    <!-- Tabs -->
    <div id="tabs">
      <button data-tab="sell" class="active">Sell Book</button>
      <button data-tab="search">Search Books</button>
      <button data-tab="chat">Chat</button>
    </div>

    <!-- Tab Contents -->

    <!-- Sell Book Tab -->
    <div id="sell" class="tab-content" style="display:flex; flex-direction: column;">
      <form id="book-form">
        <h2>Sell Your Book</h2>
        <input type="text" id="book-name" placeholder="Book Name" required autocomplete="off" />
        <input type="text" id="subject-course" placeholder="Subject / Course Name" required autocomplete="off" />
        <input type="number" id="price" placeholder="Price (₹)" min="1" required />
        <input type="file" id="book-photo" accept="image/*" required />
        <progress id="upload-progress" value="0" max="100"></progress>
        <button type="submit">Upload Book</button>
        <div id="book-status"></div>
        <div id="book-error"></div>
      </form>
    </div>

    <!-- Search Books Tab -->
    <div id="search" class="tab-content" style="display:none; flex-direction: column;">
      <h2>Search Books</h2>
      <input type="text" id="search-input" placeholder="Search by book name..." autocomplete="off" />
      <div id="search-status"></div>
      <div id="search-error"></div>
      <div id="search-results"></div>
    </div>

    <!-- Chat Tab -->
    <div id="chat" class="tab-content" style="display:none; flex-direction: column;">
      <h2>Chat</h2>
      <div id="chat-section">
        <div id="user-list">
          <h4>Users</h4>
          <div id="users-container">
            <!-- dynamically loaded users -->
          </div>
        </div>
        <div id="chat-window">
          <div id="chat-header">Select a user to start chatting</div>
          <div id="messages"></div>
          <div id="chat-input-container" style="display:none;">
            <textarea id="chat-input" rows="2" placeholder="Type your message..."></textarea>
            <button id="chat-send-btn" disabled>Send</button>
          </div>
          <div id="chat-error"></div>
        </div>
      </div>
    </div>

  </section>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBW9Wa56IyBeroMKEP3qKpJCMO8RMrIYAk",
    authDomain: "bookmate-acc8c.firebaseapp.com",
    projectId: "bookmate-acc8c",
    storageBucket: "bookmate-acc8c.appspot.com",
    messagingSenderId: "655137654495",
    appId: "1:655137654495:web:dcbccd32fc6d00b3af4b6a"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const storage = firebase.storage();
  const db = firebase.firestore();

  // DOM Elements
  const authForm = document.getElementById('auth-form');
  const emailInput = document.getElementById('email');
  const passInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const registerBtn = document.getElementById('register-btn');
  const authStatus = document.getElementById('auth-status');
  const authError = document.getElementById('auth-error');

  const dashboard = document.getElementById('dashboard');
  const userEmailSpan = document.getElementById('user-email');
  const logoutBtn = document.getElementById('logout-btn');

  const tabs = document.querySelectorAll('#tabs button');
  const tabContents = document.querySelectorAll('.tab-content');

  // Sell Book Elements
  const bookForm = document.getElementById('book-form');
  const bookNameInput = document.getElementById('book-name');
  const subjectInput = document.getElementById('subject-course');
  const priceInput = document.getElementById('price');
  const photoInput = document.getElementById('book-photo');
  const uploadProgress = document.getElementById('upload-progress');
  const bookStatus = document.getElementById('book-status');
  const bookError = document.getElementById('book-error');

  // Search Books Elements
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  const searchStatus = document.getElementById('search-status');
  const searchError = document.getElementById('search-error');

  // Chat Elements
  const usersContainer = document.getElementById('users-container');
  const chatHeader = document.getElementById('chat-header');
  const messagesDiv = document.getElementById('messages');
  const chatInputContainer = document.getElementById('chat-input-container');
  const chatInput = document.getElementById('chat-input');
  const chatSendBtn = document.getElementById('chat-send-btn');
  const chatError = document.getElementById('chat-error');

  let currentUser = null;
  let currentChatUser = null;
  let unsubscribeMessages = null;
  let usersList = [];

  // --- AUTH ---

  // On Auth state changed
  auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
      authForm.style.display = 'none';
      dashboard.style.display = 'flex';
      userEmailSpan.textContent = user.email;
      loadUsersForChat();
      showTab('sell'); // default tab
    } else {
      dashboard.style.display = 'none';
      authForm.style.display = 'flex';
      clearBookForm();
      clearSearchResults();
      clearChat();
    }
    authStatus.textContent = '';
    authError.textContent = '';
  });

  // Login handler
  authForm.addEventListener('submit', async e => {
    e.preventDefault();
    authStatus.textContent = '';
    authError.textContent = '';

    const email = emailInput.value.trim();
    const password = passInput.value;

    if (!email || !password) {
      authError.textContent = 'Email and password are required.';
      return;
    }

    authStatus.textContent = 'Logging in...';
    try {
      await auth.signInWithEmailAndPassword(email, password);
      authStatus.textContent = 'Logged in successfully!';
    } catch (error) {
      authStatus.textContent = '';
      authError.textContent = error.message;
    }
  });

  // Register handler
  registerBtn.addEventListener('click', async () => {
    authStatus.textContent = '';
    authError.textContent = '';

    const email = emailInput.value.trim();
    const password = passInput.value;

    if (!email || !password) {
      authError.textContent = 'Email and password are required.';
      return;
    }

    authStatus.textContent = 'Creating account...';
    try {
      await auth.createUserWithEmailAndPassword(email, password);
      authStatus.textContent = 'Account created! Logging in...';
    } catch (error) {
      authStatus.textContent = '';
      authError.textContent = error.message;
    }
  });

  logoutBtn.addEventListener('click', () => {
    auth.signOut();
  });

  // --- TABS ---

  tabs.forEach(tabBtn => {
    tabBtn.addEventListener('click', () => {
      showTab(tabBtn.dataset.tab);
    });
  });

  function showTab(tabName) {
    tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
    tabContents.forEach(tc => tc.style.display = (tc.id === tabName ? 'flex' : 'none'));

    if(tabName === 'search') {
      searchInput.focus();
      performSearch(searchInput.value.trim());
    }
    if(tabName === 'chat') {
      // Load users if not loaded yet
      if(usersList.length === 0) loadUsersForChat();
      if(currentChatUser) selectChatUser(currentChatUser.id);
    }
  }

  // --- SELL BOOK ---

  bookForm.addEventListener('submit', async e => {
    e.preventDefault();
    bookError.textContent = '';
    bookStatus.textContent = '';
    uploadProgress.style.display = 'none';
    uploadProgress.value = 0;

    const name = bookNameInput.value.trim();
    const subject = subjectInput.value.trim();
    const price = Number(priceInput.value);
    const photoFile = photoInput.files[0];

    if (!name || !subject || !price || !photoFile) {
      bookError.textContent = 'All fields including photo are required.';
      return;
    }
    if(price < 1) {
      bookError.textContent = 'Price must be at least ₹1.';
      return;
    }

    try {
      // Upload photo first
      bookStatus.textContent = 'Uploading photo...';
      uploadProgress.style.display = 'block';

      const photoRef = storage.ref().child(`book_photos/${Date.now()}_${photoFile.name}`);
      const uploadTask = photoRef.put(photoFile);

      uploadTask.on('state_changed', snapshot => {
        const percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        uploadProgress.value = percent;
      });

      await uploadTask;

      const photoURL = await photoRef.getDownloadURL();

      // Save book info in Firestore
      bookStatus.textContent = 'Saving book info...';

      await db.collection('books').add({
        sellerId: currentUser.uid,
        sellerEmail: currentUser.email,
        name,
        subject,
        price,
        photoURL,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      bookStatus.textContent = 'Book uploaded successfully!';
      clearBookForm();

    } catch (err) {
      bookError.textContent = err.message;
      bookStatus.textContent = '';
      uploadProgress.style.display = 'none';
    }
  });

  function clearBookForm() {
    bookForm.reset();
    uploadProgress.style.display = 'none';
    uploadProgress.value = 0;
    bookError.textContent = '';
    bookStatus.textContent = '';
  }

  // --- SEARCH BOOKS ---

  searchInput.addEventListener('input', e => {
    const query = e.target.value.trim();
    performSearch(query);
  });

  let searchTimeout = null;

  function performSearch(query) {
    searchResults.innerHTML = '';
    searchStatus.textContent = '';
    searchError.textContent = '';

    if (searchTimeout) clearTimeout(searchTimeout);

    if (!query) {
      searchStatus.textContent = 'Type to search books by name.';
      return;
    }

    searchStatus.textContent = 'Searching...';

    // Debounce firestore query
    searchTimeout = setTimeout(async () => {
      try {
        const q = db.collection('books')
          .orderBy('name')
          .startAt(query)
          .endAt(query + '\uf8ff')
          .limit(30);

        const snapshot = await q.get();

        if (snapshot.empty) {
          searchStatus.textContent = 'No books found.';
          return;
        }

        searchStatus.textContent = '';

        snapshot.forEach(doc => {
          const b = doc.data();
          const bookEl = document.createElement('div');
          bookEl.classList.add('book-item');

          bookEl.innerHTML = `
            <img class="book-photo" src="${b.photoURL}" alt="Book photo" />
            <div class="book-info">
              <p class="book-name">${escapeHtml(b.name)}</p>
              <p class="book-subject">${escapeHtml(b.subject)}</p>
              <p class="book-price">₹${b.price}</p>
              <p style="font-size: 12px; color: #666;">Seller: ${escapeHtml(b.sellerEmail)}</p>
            </div>
          `;

          searchResults.appendChild(bookEl);
        });

      } catch (err) {
        searchError.textContent = 'Error fetching books: ' + err.message;
        searchStatus.textContent = '';
      }
    }, 400);
  }

  function clearSearchResults() {
    searchResults.innerHTML = '';
    searchStatus.textContent = '';
    searchError.textContent = '';
    searchInput.value = '';
  }

  // --- CHAT FEATURE ---

  // Load all users except current user
  async function loadUsersForChat() {
    usersContainer.innerHTML = 'Loading users...';
    chatError.textContent = '';
    usersList = [];
    try {
      const snapshot = await db.collection('users').get();
      let usersFound = 0;
      usersContainer.innerHTML = '';
      snapshot.forEach(doc => {
        const userData = doc.data();
        if (userData.uid !== currentUser.uid) {
          usersList.push(userData);
          usersFound++;
          const userDiv = document.createElement('div');
          userDiv.textContent = userData.email;
          userDiv.classList.add('user-item');
          userDiv.dataset.uid = userData.uid;
          usersContainer.appendChild(userDiv);

          userDiv.addEventListener('click', () => {
            selectChatUser(userData.uid);
          });
        }
      });
      if(usersFound === 0) {
        usersContainer.innerHTML = '<p style="margin:12px; font-size:14px; color:#666;">No other users found.</p>';
      }
    } catch (err) {
      usersContainer.innerHTML = '';
      chatError.textContent = 'Failed to load users: ' + err.message;
    }
  }

  // Select a chat user to chat with
  function selectChatUser(otherUid) {
    if (unsubscribeMessages) unsubscribeMessages();

    currentChatUser = usersList.find(u => u.uid === otherUid);

    if (!currentChatUser) {
      chatError.textContent = 'User not found.';
      chatHeader.textContent = 'Select a user to start chatting';
      chatInputContainer.style.display = 'none';
      messagesDiv.innerHTML = '';
      return;
    }

    chatError.textContent = '';
    chatHeader.textContent = `Chat with ${currentChatUser.email}`;
    chatInputContainer.style.display = 'flex';
    chatInput.value = '';
    chatSendBtn.disabled = true;
    messagesDiv.innerHTML = '';

    // Highlight selected user
    document.querySelectorAll('.user-item').forEach(el => {
      el.classList.toggle('selected', el.dataset.uid === otherUid);
    });

    // Load messages between currentUser and selected user
    const chatId = getChatId(currentUser.uid, otherUid);

    unsubscribeMessages = db.collection('chats').doc(chatId).collection('messages')
      .orderBy('timestamp')
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = '';
        snapshot.forEach(doc => {
          const msg = doc.data();
          addMessageToChat(msg);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }, error => {
        chatError.textContent = 'Failed to load messages: ' + error.message;
      });
  }

  // Generate a consistent chatId for two user ids
  function getChatId(uid1, uid2) {
    return uid1 < uid2 ? uid1 + '_' + uid2 : uid2 + '_' + uid1;
  }

  // Add message bubble to chat window
  function addMessageToChat(msg) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message');
    if (msg.sender === currentUser.uid) {
      msgDiv.classList.add('sent');
    } else {
      msgDiv.classList.add('received');
    }
    msgDiv.textContent = msg.text;
    messagesDiv.appendChild(msgDiv);
  }

  // Send message handler
  chatSendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('input', () => {
    chatSendBtn.disabled = !chatInput.value.trim();
  });
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !chatSendBtn.disabled) {
      e.preventDefault();
      sendMessage();
    }
  });

  async function sendMessage() {
    if (!currentChatUser) return;

    const text = chatInput.value.trim();
    if (!text) return;

    const chatId = getChatId(currentUser.uid, currentChatUser.uid);

    try {
      await db.collection('chats').doc(chatId).collection('messages').add({
        sender: currentUser.uid,
        receiver: currentChatUser.uid,
        text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      chatInput.value = '';
      chatSendBtn.disabled = true;
    } catch (err) {
      chatError.textContent = 'Failed to send message: ' + err.message;
    }
  }

  // Clear chat UI on logout
  function clearChat() {
    usersContainer.innerHTML = '';
    chatHeader.textContent = 'Select a user to start chatting';
    messagesDiv.innerHTML = '';
    chatInputContainer.style.display = 'none';
    chatError.textContent = '';
    currentChatUser = null;
    if(unsubscribeMessages) {
      unsubscribeMessages();
      unsubscribeMessages = null;
    }
  }

  // --- USER DOCUMENT CREATION ON SIGNUP ---

  // Listen for auth state and create user doc if missing
  auth.onAuthStateChanged(async user => {
    if(user) {
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if(!userDoc.exists){
          await db.collection('users').doc(user.uid).set({
            uid: user.uid,
            email: user.email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } catch (err) {
        // console.warn('Error ensuring user doc:', err.message);
      }
    }
  });

  // --- UTILITIES ---

  // Escape HTML for text content
  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, function(m) {
      return ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[m];
    });
  }
</script>

</body>
</html>
